# Kismet site configuration — edit the values below for your setup.
# This file is mounted into the Kismet container at
# /usr/local/etc/kismet_site.conf and overrides settings from
# /usr/local/etc/kismet.conf.
#
# ___ CAPTURE DEVICES __________________________________________
# Set one source= line per capture interface.  Replace <iface> with
# the interface name from `iw dev` and <name> with any label you
# want to see in the Kismet UI.
#
# Examples:
# source=wlan1:name=alfa0,channel_hop=true,truncate_data=true
# source=wlx00c0cab47818:name=alfa1,channel_hop=true,channels="1,6,11"
# source=wlan2:name=fixed-ch149,channel_hop=false,channel="149"

source=wlan0:name=DojoKismet,channel_hop=true,truncate_data=true

################################################################


# ___ SERVER NAME & DESCRIPTION ________________________________
server_name="Classroom Kismet"
server_description="Classroom Kismet Server"
################################################################


# ___ WEB SERVER & API _________________________________________
# Kismet will prompt for these credentials on first run at
# http://<host>:2501 and write them to ~/.kismet/kismet_httpd.conf
# inside the container.  The container volume is ephemeral, so for
# persistent credentials set them here instead.
#
httpd_username=itdojo
httpd_password=itdojo44

httpd_listen=tcp://0.0.0.0:2501
################################################################


# ___ LOGGING __________________________________________________
logging_enabled=true
log_types=kismet
log_title=Kismet
log_template=%p%n-%D-%t-%i.%l
log_prefix=/kismet_logs
################################################################


# ___ GPS ______________________________________________________
# With network_mode: host on both containers, gpsd is reachable on
# localhost:2947 from inside the Kismet container.
gps=gpsd:host=127.0.0.1,port=2947,name=gpsd

# Alternative — direct USB/serial GPS (requires exposing the device
# to the Kismet container instead of gpsd):
# gps=serial:device=/dev/ttyUSB0

# Alternative — hard-coded fixed coordinates for bench testing:
# gps=virtual:lat=<lat>,lon=<lon>,alt=<alt>
################################################################
